site_name: clean-charts API Reference
site_description: Python library for generating premium, publication-quality charts.

theme:
  name: material
  custom_dir: docs/overrides # Optional if we want to override CSS later
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Chart Reference:
    - Overview: reference/index.md
    - Time Series: reference/time_series.md
    - Bar Charts: reference/bar_charts.md
    - Grouped Bar: reference/grouped_barh.md
    - Donut: reference/donut.md
    - Stacked Bar: reference/stacked_bar.md
    - Waffle: reference/waffle.md
    - Dumbbell: reference/dumbbell.md
    - Insight Card: reference/insight_card.md
    - Bubble Matrix: reference/bubble_matrix.md
    - Table: reference/table.md
    - Geofacet: reference/geofacet.md
    - Dashboard: reference/dashboard.md
